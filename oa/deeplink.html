<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Deep link</title>

</head>
<body>

    <a id="deeplink" href="https://www.wholefoodsmarket.com/app/list">wfm shopping list</a>
    <script>
        window.onload = function () {
            document.getElementById("deeplink").click();
        };
        function openApp(){
            location.href="https://www.wholefoodsmarket.com/app/list";
        }
    </script>

    <br/>
    <br/>
    <button onclick="window.location.href='https://www.wholefoodsmarket.com/app/list'">Open App(shopping List)</button>
</body>

</html>
